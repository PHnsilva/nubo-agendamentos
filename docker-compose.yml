services:
  postgres:
    image: postgres:16-alpine
    container_name: nubo-postgres
    environment:
      POSTGRES_DB: nubo
      POSTGRES_USER: nubo
      POSTGRES_PASSWORD: nubo123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nubo -d nubo"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: nubo-backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/nubo
      DATABASE_USERNAME: nubo
      DATABASE_PASSWORD: nubo123
      JWT_SECRET: trocar-em-producao-com-ao-menos-32-caracteres
      JWT_EXPIRATION_MINUTES: 120
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    container_name: nubo-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres-data:
