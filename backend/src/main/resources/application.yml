server:
  port: 8080

spring:
  application:
    name: nubo-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/nubo}
    username: ${DATABASE_USERNAME:nubo}
    password: ${DATABASE_PASSWORD:nubo123}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true

nubo:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
