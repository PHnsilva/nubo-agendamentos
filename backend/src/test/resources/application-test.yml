spring:
  datasource:
    url: jdbc:h2:mem:nubo;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

nubo:
  jwt:
    secret: test-secret-change-me-test-secret-change-me
    expiration-minutes: 120
  cors:
    allowed-origins: http://localhost:5173
